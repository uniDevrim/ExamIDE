    <!-- TimeMachine Startup Overlay (yeni sınav mı, devam mı?) -->
    <div class="tm-startup-overlay" id="tmStartupOverlay">
        <div class="tm-startup-box">
            <div class="tm-startup-icon">
                <i class="bi bi-clock-history"></i>
            </div>
            <div class="tm-startup-title">Önceki Sınav Oturumu Bulundu</div>
            <div class="tm-startup-info" id="tmStartupInfo">Yükleniyor...</div>

            <div class="tm-startup-actions">
                <button class="btn-tm-resume" onclick="tmResumeExam()">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Devam Et
                    <span class="tm-btn-hint">Kaldığı yerden devam eder</span>
                </button>
                <button class="btn-tm-new" onclick="tmAskNewExam()">
                    <i class="bi bi-plus-circle-fill"></i>
                    Yeni Sınav
                    <span class="tm-btn-hint">Eski verileri temizler</span>
                </button>
            </div>
        </div>
    </div>
