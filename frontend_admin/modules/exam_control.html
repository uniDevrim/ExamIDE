        <!-- ═══ EXAM CONTROL PANEL (Accordion) ═══ -->
        <div class="accordion-panel open" id="controlAccordion">
            <div class="accordion-header" onclick="toggleAccordion('controlAccordion')">
                <div class="accordion-title">
                    <i class="bi bi-sliders2"></i>
                    Sınav Kontrolü
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="exam-state-badge idle" id="examStateBadge" onclick="event.stopPropagation()">
                        <span class="state-dot-badge"></span>
                        <span id="examStateText">Bekleniyor</span>
                    </div>
                    <i class="bi bi-chevron-down accordion-chevron"></i>
                </div>
            </div>
            <div class="accordion-body">
                <div class="control-layout">
                    <!-- Upload Section -->
                    <div class="upload-section">
                        <div class="upload-label">
                            <i class="bi bi-file-earmark-code"></i>
                            Soru Dosyası (JSON)
                        </div>
                        <div class="upload-dropzone" id="dropzone">
                            <input type="file" accept=".json" id="jsonFileInput" onchange="handleFileSelect(event)">
                            <div class="upload-icon"><i class="bi bi-cloud-arrow-up"></i></div>
                            <div class="upload-hint">
                                <strong>Dosya seçin</strong> veya buraya sürükleyin<br>
                                <span style="font-size:0.72rem; opacity:0.7;">Yalnızca .json uzantılı dosyalar</span>
                            </div>
                        </div>
                        <div class="file-loaded" id="fileLoaded">
                            <div class="file-loaded-icon"><i class="bi bi-file-earmark-check-fill"></i></div>
                            <div class="file-loaded-info">
                                <div class="file-loaded-name" id="fileLoadedName">sorular.json</div>
                                <div class="file-loaded-meta" id="fileLoadedMeta">— soru yüklendi</div>
                            </div>
                            <button class="btn-remove-file" onclick="removeFile()" title="Dosyayı Kaldır"><i class="bi bi-x-lg"></i></button>
                        </div>
                    </div>
                    <!-- Actions Section -->
                    <div class="actions-section">
                        <div class="actions-label"><i class="bi bi-play-circle"></i> Sınav İşlemleri</div>
                        <div class="actions-grid">
                            <button class="btn-exam btn-start" id="btnStart" onclick="startExam()" disabled><i class="bi bi-play-fill"></i> Sınavı Başlat</button>
                            <button class="btn-exam btn-pause" id="btnPause" onclick="pauseExam()" disabled><i class="bi bi-pause-fill"></i> Duraklat</button>
                            <button class="btn-exam btn-resume" id="btnResume" onclick="resumeExam()" disabled><i class="bi bi-skip-forward-fill"></i> Devam Et</button>
                            <button class="btn-exam btn-end" id="btnEnd" onclick="confirmEndExam()" disabled><i class="bi bi-stop-fill"></i> Sınavı Bitir</button>
                        </div>
                    </div>
                </div>
                <!-- Timer row -->
                <div class="timer-row">
                    <div class="timer-block">
                        <div class="timer-label">Geçen Süre</div>
                        <div class="timer-value" id="elapsedTimer">00:00:00</div>
                    </div>
                    <div class="divider-v"></div>
                    <div class="timer-block">
                        <div class="timer-label">Sınav Durumu</div>
                        <div class="timer-value" id="examStatusTimer" style="color: var(--text-muted);">—</div>
                    </div>
                    <div class="questions-loaded-info" id="questionsInfo" style="display:none;">
                        <i class="bi bi-list-check"></i>
                        <span class="q-count" id="qCount">0</span>
                        <span>soru yüklendi</span>
                    </div>
                </div>
            </div>
        </div>
